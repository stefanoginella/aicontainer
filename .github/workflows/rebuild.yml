name: rebuild

on:
  schedule:
    # 03:17 UTC Monday. Offset off the top of the hour on purpose: GitHub
    # delays/drops scheduled runs under load, and :00 slots are the most
    # congested (the 0 6 slot ran ~2h late). An odd minute reduces contention.
    - cron: '17 3 * * 1'
  push:
    branches: [main]
    # Anything under template/ is baked into the image or is the compose/
    # devcontainer the smoke job exercises, so a glob is both correct and
    # self-maintaining — an enumerated list silently drifted (it named a
    # nonexistent template/docker-compose.yml; the real files are
    # docker-compose.{pull,build}.yml, and template/.zshrc was never listed).
    paths:
      - template/**
      - aic
      - tests/**
      - package.json
      - scripts/**
      - .github/workflows/rebuild.yml
  pull_request:
    paths:
      - template/**
      - aic
      - tests/**
      - package.json
      - scripts/**
      - .github/workflows/rebuild.yml
      - .github/workflows/release.yml
  workflow_dispatch:

permissions:
  contents: read

# Supersede stale publishing rebuilds across push/schedule/manual events: they
# all target the same mutable tags. Pull requests remain isolated per ref so a
# PR validation cannot cancel a security refresh on main.
concurrency:
  group: rebuild-${{ github.event_name == 'pull_request' && github.ref || 'publish' }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - name: Build multi-arch (no push, validates build)
        uses: docker/build-push-action@v7
        with:
          context: template
          platforms: linux/amd64,linux/arm64
          push: false
          pull: true
          no-cache: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
          tags: aicontainer:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  smoke:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Static test - registry publishing stays serialized and fail-closed
        run: |
          python3 - <<'PY'
          import re
          from pathlib import Path

          workflows = [
              Path(".github/workflows/rebuild.yml"),
              Path(".github/workflows/release.yml"),
          ]
          headers = [path.read_text().split("\njobs:\n", 1)[0] for path in workflows]
          assert "group: aicontainer-registry-publish" not in headers[0]
          assert "group: aicontainer-registry-publish" not in headers[1]
          assert "group: rebuild-" in headers[0]
          assert "group: aicontainer-release" in headers[1]
          for path in workflows:
              text = path.read_text()
              match = re.search(
                  r"(?ms)^  publish:\n(.*?)(?=^  [A-Za-z0-9_-]+:\n|\Z)", text
              )
              assert match, f"{path}: publish job missing"
              publish = match.group(1)
              lock = re.search(
                  r"(?m)^    concurrency:\n"
                  r"((?:^      [^\n]*\n)+)", publish
              )
              assert lock, f"{path}: publish concurrency missing"
              lock_text = lock.group(1)
              assert "group: aicontainer-registry-publish" in lock_text, path
              assert "cancel-in-progress: false" in lock_text, path
              assert "queue: max" in lock_text, path

          release = workflows[1].read_text()
          publish = re.search(
              r"(?ms)^  publish:\n(.*?)(?=^  github-release:\n)", release
          ).group(1)
          assert publish.index("id: npm_version") < publish.index("id: ghcr_version")
          for required in (
              'imagetools inspect "$image" --raw',
              'org.opencontainers.image.revision',
              'org.opencontainers.image.version',
              'io.aicontainer.channel',
              'GITHUB_SHA',
              'NPM_VERSION_EXISTS',
              'GHCR_VERSION_IDENTITY',
              'identity=verified',
              'identity=legacy',
              'Refusing partial recovery',
              'unverified legacy tag; leaving :latest unchanged',
          ):
              assert required in publish, f"release.yml: missing {required}"
          print("OK: shared registry lock and immutable-tag identity gate present")
          PY
      - name: Host/helper security regression tests
        run: |
          set -euo pipefail
          for test in tests/*.sh; do
            bash "$test"
          done
          for test in tests/*.py; do
            PYTHONDONTWRITEBYTECODE=1 python3 -I "$test"
          done
      - name: Install devcontainer CLI
        run: npm install -g @devcontainers/cli@latest
      - name: Stage a throwaway project (exercises `aic init --build`)
        run: |
          mkdir -p /tmp/proj/.devcontainer "$HOME/.local/bin"
          ln -sf "$GITHUB_WORKSPACE/aic" "$HOME/.local/bin/aic"
          cat > /tmp/proj/.devcontainer/docker-compose.override.yml <<'YAML'
          services:
            devcontainer:
              volumes:
                - aic-smoke-venv:/workspace/.venv-smoke
          volumes:
            aic-smoke-venv:
          YAML
          cd /tmp/proj && git init -q
          AIC_HOME="$GITHUB_WORKSPACE" "$GITHUB_WORKSPACE/aic" init --build --force
      - name: Bring up the devcontainer
        working-directory: /tmp/proj
        run: devcontainer up --workspace-folder .
      - name: Smoke test - AI CLIs resolve (Codex is standalone, not npm)
        working-directory: /tmp/proj
        run: |
          devcontainer exec --workspace-folder . claude --version
          devcontainer exec --workspace-folder . codex --version
          devcontainer exec --workspace-folder . opencode --version
          devcontainer exec --workspace-folder . gh --version
          devcontainer exec --workspace-folder . uv --version
          # Codex must be the official standalone install in ~/.local/bin, not an
          # npm global. Dropping npm is deliberate (so `codex update` works and the
          # CLI no longer rides the npm release-age quarantine); guard the swap so a
          # revert to `npm i -g @openai/codex` is caught.
          codex_path=$(devcontainer exec --workspace-folder . bash -lc 'command -v codex' | tr -d '\r' | tail -1)
          echo "codex resolves to: $codex_path"
          case "$codex_path" in
            */.local/bin/codex) echo "OK: codex is the standalone install" ;;
            *) echo "FAIL: codex not in ~/.local/bin (got '$codex_path'); npm install may have crept back"; exit 1 ;;
          esac
          # OpenCode is the standalone installer into ~/.opencode/bin (so
          # `opencode upgrade` works and it skips the npm quarantine).
          oc_path=$(devcontainer exec --workspace-folder . bash -lc 'command -v opencode' | tr -d '\r' | tail -1)
          echo "opencode resolves to: $oc_path"
          case "$oc_path" in
            */.opencode/bin/opencode) echo "OK: opencode is the standalone install" ;;
            *) echo "FAIL: opencode not in ~/.opencode/bin (got '$oc_path')"; exit 1 ;;
          esac
      - name: Smoke test - tool self-update works with rc files root-locked
        working-directory: /tmp/proj
        run: |
          # refresh_ai_tools() runs `claude update` / `codex update` /
          # `opencode upgrade` on every container create. `codex update` re-runs
          # the official installer, which must NOT fail trying to edit the
          # managed shell startup files (root-owned and immutable in the image) —
          # it skips that because ~/.local/bin is already on PATH. opencode was
          # installed with --no-modify-path so `opencode upgrade` never touches
          # them. A regression would silently fall back to the baked version
          # (refresh is fail-soft), so assert all three updaters exit 0 here.
          devcontainer exec --workspace-folder . bash -lc '
            set -e
            [ "$(stat -c %U:%a /etc/aic/shell/zsh/.zshrc)" = "root:444" ] || { echo "precondition: managed .zshrc not root-locked"; exit 1; }
            claude update
            codex update
            opencode upgrade
            echo "OK: claude + codex + opencode self-update cleanly with rc files locked"
          '
      - name: Smoke test - socket-proxy exposes only ping/version by default
        working-directory: /tmp/proj
        run: |
          grep -qF 'tecnativa/docker-socket-proxy:v0.4.2@sha256:1f3a6f303320723d199d2316a3e82b2e2685d86c275d5e3deeaf182573b47476' .devcontainer/docker-compose.yml \
            || { echo "FAIL: socket-proxy image is not digest-pinned"; exit 1; }
          devcontainer exec --workspace-folder . curl -fsS http://socket-proxy:2375/_ping
          devcontainer exec --workspace-folder . curl -fsS http://socket-proxy:2375/version >/dev/null
          set +e
          read_out=$(devcontainer exec --workspace-folder . curl -s -o /dev/null -w '%{http_code}' \
            http://socket-proxy:2375/containers/json)
          out=$(devcontainer exec --workspace-folder . curl -s -o /dev/null -w '%{http_code}' \
            -X POST http://socket-proxy:2375/exec/none/start)
          set -e
          [ "$read_out" = "403" ] || { echo "expected 403 from socket-proxy /containers/json (Docker reads should be off by default), got $read_out"; exit 1; }
          [ "$out" = "403" ] || { echo "expected 403 from socket-proxy /exec, got $out"; exit 1; }
          # Docker read and write access are separate opt-ins. A plain init has
          # both off; in particular POST/BUILD=0 stops a host escape via
          # `docker run --privileged -v /:/host`.
          set +e
          out=$(devcontainer exec --workspace-folder . curl -s -o /dev/null -w '%{http_code}' \
            -X POST http://socket-proxy:2375/containers/create)
          out2=$(devcontainer exec --workspace-folder . curl -s -o /dev/null -w '%{http_code}' \
            -X POST http://socket-proxy:2375/build)
          set -e
          [ "$out" = "403" ]  || { echo "expected 403 from socket-proxy /containers/create (POST should be off by default), got $out"; exit 1; }
          [ "$out2" = "403" ] || { echo "expected 403 from socket-proxy /build (BUILD should be off by default), got $out2"; exit 1; }
          echo "OK: only ping/version are exposed by default (reads/EXEC/POST/BUILD all blocked)"

      - name: Smoke test - cloud metadata / link-local egress is blocked
        working-directory: /tmp/proj
        run: |
          # post-create runs `sudo aic-firewall block-metadata` on every create,
          # dropping IPv4/IPv6 link-local plus the Alibaba and AWS IMDSv6
          # endpoints independently of the opt-in allowlist. Re-run it
          # (idempotent) and inspect the scoped `aic-firewall status` output.
          # block-metadata is strengthen-only, so like `enable` it can't widen
          # policy. It fails when IPv6 is configured but cannot be filtered;
          # only hosts without configured IPv6 legitimately omit IPv6 rules.
          devcontainer exec --workspace-folder . bash -lc '
            set -e
            sudo -n /usr/local/bin/aic-firewall block-metadata
            st=$(sudo -n /usr/local/bin/aic-firewall status)
            echo "$st"

            status_section() {
              local heading=$1 line inside=0
              while IFS= read -r line; do
                if [ "$line" = "$heading" ]; then
                  inside=1
                  continue
                fi
                case "$line" in
                  "## "*) inside=0 ;;
                esac
                [ "$inside" -eq 0 ] || printf "%s\n" "$line"
              done <<< "$st"
            }
            v4_output=$(status_section "## iptables OUTPUT chain")
            v4_metadata=$(status_section "## iptables AIC_METADATA chain (always-on metadata/link-local block)")
            printf "%s\n" "$v4_output" | grep -q "AIC_METADATA" || { echo "FAIL: IPv4 OUTPUT does not jump to AIC_METADATA"; exit 1; }
            printf "%s\n" "$v4_metadata" | grep -q "169.254.0.0/16" || { echo "FAIL: IPv4 link-local DROP rule missing"; exit 1; }
            printf "%s\n" "$v4_metadata" | grep -q "100.100.100.200" || { echo "FAIL: Alibaba metadata DROP rule missing"; exit 1; }

            if printf "%s\n" "$st" | grep -q "^## ip6tables AIC_METADATA chain$"; then
              v6_output=$(status_section "## ip6tables OUTPUT chain")
              v6_metadata=$(status_section "## ip6tables AIC_METADATA chain")
              printf "%s\n" "$v6_output" | grep -q "AIC_METADATA" || { echo "FAIL: IPv6 OUTPUT does not jump to AIC_METADATA"; exit 1; }
              printf "%s\n" "$v6_metadata" | grep -q "fe80::/10" || { echo "FAIL: IPv6 link-local DROP rule missing"; exit 1; }
              printf "%s\n" "$v6_metadata" | grep -q "fd00:ec2::254" || { echo "FAIL: AWS IMDSv6 DROP rule missing"; exit 1; }
              echo "OK: IPv4 and IPv6 metadata/link-local egress is dropped"
            elif ip -o -6 addr show up 2>/dev/null | grep -vE "^[0-9]+: lo " | grep -q .; then
              echo "FAIL: IPv6 is configured but its metadata filter is absent"
              exit 1
            else
              echo "OK: IPv4 metadata/link-local egress is dropped; IPv6 is not configured"
            fi
          '
      - name: Smoke test - npm quarantine window is sane (npx-based MCPs installable)
        working-directory: /tmp/proj
        run: |
          devcontainer exec --workspace-folder . bash -lc '
            val="${NPM_CONFIG_MIN_RELEASE_AGE-}"
            echo "NPM_CONFIG_MIN_RELEASE_AGE=$val"
            [ -n "$val" ] || { echo "FAIL: NPM_CONFIG_MIN_RELEASE_AGE unset"; exit 1; }
            [ "$val" -ge 0 ] 2>/dev/null || { echo "FAIL: not a non-negative integer"; exit 1; }
            # npm interprets this value in DAYS. Anything > 30 makes most active
            # npx-based MCP plugins unusable; almost certainly a unit mistake
            # (e.g. believing 1440 means 24h in minutes — it means 1440 days).
            [ "$val" -le 30 ] || { echo "FAIL: $val days is too restrictive; npx MCPs will fail with ENOVERSIONS"; exit 1; }
            echo "OK: npm quarantine is ${val} day(s)"
          '

      - name: Smoke test - PreToolUse hook blocks .env
        working-directory: /tmp/proj
        run: |
          devcontainer exec --workspace-folder . bash -lc '
            cd /workspace
            printf "SECRET=hunter2\n" > .env
            payload='\''{"tool_name":"Read","tool_input":{"file_path":"/workspace/.env"}}'\''
            if echo "$payload" | /etc/aic/hooks/pre-tool-use.sh; then
              echo "hook FAILED to block .env"
              exit 1
            else
              echo "hook correctly blocked .env"
            fi
          '

      - name: Smoke test - OpenCode guardrail blocks a .env read
        working-directory: /tmp/proj
        run: |
          # post-create must force permission=allow + wire the guardrail plugin,
          # and the shim must block a .env read by shelling out to the shared
          # pre-tool-use.sh. (A full `opencode run` needs an authed model, so we
          # exercise the plugin's tool.execute.before hook directly via node —
          # this proves the mapping + script integration; plugin-load-without-
          # trust-prompt is checked manually per the release notes.)
          devcontainer exec --workspace-folder . bash -lc '
            set -e
            cfg=$HOME/.config/opencode/opencode.json
            grep -qF "\"*\": \"allow\"" "$cfg" || { echo "FAIL: opencode permission not forced to allow"; exit 1; }
            grep -qF "/etc/aic/hooks/opencode-guardrail.js" "$cfg" || { echo "FAIL: guardrail plugin not wired in opencode.json"; exit 1; }
            cd /workspace
            printf "SECRET=hunter2\n" > .env
            node --input-type=module -e "
              import { AicGuardrail } from \"/etc/aic/hooks/opencode-guardrail.js\";
              const h = await AicGuardrail();
              let blocked = false;
              try { await h[\"tool.execute.before\"]({tool:\"read\"}, {args:{filePath:\"/workspace/.env\"}}); }
              catch { blocked = true; }
              if (!blocked) { console.error(\"FAIL: guardrail did not block .env read\"); process.exit(1); }
              await h[\"tool.execute.before\"]({tool:\"read\"}, {args:{filePath:\"/workspace/.devcontainer/devcontainer.json\"}});
              console.log(\"OK: opencode guardrail blocks .env, allows a normal read\");
            "
          '

      - name: Smoke test - scoped sudo cannot chown arbitrary paths
        working-directory: /tmp/proj
        run: |
          devcontainer exec --workspace-folder . bash -lc '
            sudo -n /usr/local/bin/aic-chown-volumes
            if sudo -nl /usr/bin/chown 2>/dev/null | grep -q chown; then
              echo "FAIL: /usr/bin/chown still in NOPASSWD sudoers"
              exit 1
            fi
            echo "OK: arbitrary sudo chown is denied"
          '

      - name: Smoke test - chown-paths allowlist is enforced
        working-directory: /tmp/proj
        run: |
          # chown-paths is RO-mounted + PreToolUse-blocked, so an in-container
          # tool can't add entries. But a forbidden entry (e.g. a careless
          # host-side edit) must still be refused fail-closed without touching
          # the target. We write it host-side; the live RO bind mount reflects
          # it inside the container.
          trap 'rm -f .devcontainer/chown-paths' EXIT
          printf '/etc/aic/user-config/gitconfig\n' > .devcontainer/chown-paths
          devcontainer exec --workspace-folder . bash -lc '
            sudo -n /usr/local/bin/aic-chown-volumes && { echo "FAIL: accepted out-of-allowlist path"; exit 1; }
            owner=$(stat -c "%U" /etc/aic/user-config/gitconfig)
            [ "$owner" = "root" ] || { echo "FAIL: managed gitconfig now owned by $owner"; exit 1; }
            echo "OK: forbidden chown-paths entry refused; managed gitconfig still root-owned"
          '
          printf '/workspace/.venv-smoke\n' > .devcontainer/chown-paths
          devcontainer exec --workspace-folder . bash -lc '
            sudo -n /usr/local/bin/aic-chown-volumes || { echo "FAIL: rejected a valid /workspace path"; exit 1; }
            mkdir -p /workspace/.venv-smoke/nested
            touch /workspace/.venv-smoke/writable
            echo "OK: exact standard named-volume mount accepted and made writable"
          '
          printf '/workspace/.venv-smoke/nested\n' > .devcontainer/chown-paths
          devcontainer exec --workspace-folder . bash -lc '
            sudo -n /usr/local/bin/aic-chown-volumes && { echo "FAIL: accepted a nested path below a named-volume mount"; exit 1; }
            echo "OK: nested path below a named-volume mount refused"
          '
          printf '/workspace/.devcontainer\n' > .devcontainer/chown-paths
          devcontainer exec --workspace-folder . bash -lc '
            sudo -n /usr/local/bin/aic-chown-volumes && { echo "FAIL: accepted a host bind mount"; exit 1; }
            echo "OK: allowed-prefix host bind mount refused"
          '

      - name: Smoke test - self-protection files are root-owned 0444
        working-directory: /tmp/proj
        run: |
          # Git config and every managed shell startup file live behind
          # root-owned directories and are root:root 0444. Home-level startup
          # files remain writable for compatibility, but the managed launch
          # paths must ignore them so an agent cannot plant next-shell code.
          devcontainer exec --workspace-folder . bash -lc '
            set -euo pipefail
            for f in /etc/aic/user-config/gitconfig \
                     /etc/aic/shell/zsh/.zshrc \
                     /etc/aic/shell/bashrc \
                     /etc/fish/conf.d/aic.fish; do
              [ -e "$f" ] || { echo "FAIL: $f missing (should be locked)"; exit 1; }
              perms=$(stat -c "%U %a" "$f")
              echo "$f perms: $perms"
              [ "$perms" = "root 444" ] || { echo "FAIL: $f expected root 444, got $perms"; exit 1; }
              if echo "x" >> "$f" 2>/dev/null; then
                echo "FAIL: vscode can still write to $f"; exit 1
              fi
            done
            mkdir -p "$HOME/.config/fish"
            printf "touch /tmp/aic-home-zsh-ran\n" > "$HOME/.zshrc"
            printf "touch /tmp/aic-home-bash-ran\n" > "$HOME/.bash_profile"
            printf "touch /tmp/aic-home-fish-ran\n" > "$HOME/.config/fish/config.fish"
            zsh -lic true
            bash --noprofile --rcfile /etc/aic/shell/bashrc -ic true
            fish --no-config -C "source /etc/fish/conf.d/aic.fish" -lc true
            for marker in /tmp/aic-home-zsh-ran /tmp/aic-home-bash-ran /tmp/aic-home-fish-ran; do
              [ ! -e "$marker" ] || { echo "FAIL: planted home startup file executed ($marker)"; exit 1; }
            done
            rm -f "$HOME/.zshrc" "$HOME/.bash_profile" "$HOME/.config/fish/config.fish"
            echo "OK: managed git/shell config is locked and home startup replacements are ignored"
          '

      - name: Smoke test - project post-create hook runs (vscode, /workspace, non-fatal, clean VIRTUAL_ENV)
        working-directory: /tmp/proj
        run: |
          # post-create.project.sh is opt-in by presence and RO-mounted; the
          # live bind mount reflects this host-side write inside the container.
          # post-create only runs at create time, so re-invoke it directly to
          # exercise run_project_hook (mirrors how the chown-paths test re-runs
          # the wrapper). The hook exits non-zero on purpose: post-create must
          # warn-and-continue (exit 0), never propagate the failure. It also
          # records VIRTUAL_ENV: post-create uses system Python and defensively
          # strips any launcher environment before handing off to the project.
          trap 'rm -f .devcontainer/post-create.project.sh .aic-hook-evidence' EXIT
          cat > .devcontainer/post-create.project.sh <<'SH'
          #!/usr/bin/env bash
          set -euo pipefail
          { echo "user=$(whoami)"; echo "pwd=$(pwd)"; echo "venv=${VIRTUAL_ENV:-}"; } > /workspace/.aic-hook-evidence
          exit 3
          SH
          devcontainer exec --workspace-folder . bash -lc '
            rm -f /workspace/.aic-hook-evidence
            /usr/bin/python3 /opt/post-create.py || { echo "FAIL: post-create propagated the hook non-zero exit"; exit 1; }
            [ -f /workspace/.aic-hook-evidence ] || { echo "FAIL: project hook did not run"; exit 1; }
            grep -qx "user=vscode"    /workspace/.aic-hook-evidence || { echo "FAIL: hook not run as vscode"; cat /workspace/.aic-hook-evidence; exit 1; }
            grep -qx "pwd=/workspace" /workspace/.aic-hook-evidence || { echo "FAIL: hook cwd not /workspace"; cat /workspace/.aic-hook-evidence; exit 1; }
            if grep -q "environments-v2/post-create" /workspace/.aic-hook-evidence; then echo "FAIL: hook inherited post-create ephemeral VIRTUAL_ENV"; cat /workspace/.aic-hook-evidence; exit 1; fi
            echo "OK: project hook ran as vscode in /workspace; non-zero exit non-fatal; no leaked VIRTUAL_ENV"
          '

      - name: Smoke test - sandbox memory note lands in CLAUDE.md / AGENTS.md (idempotent)
        working-directory: /tmp/proj
        run: |
          # post-create writes a managed note into the tools' user-level memory
          # files (~/.claude/CLAUDE.md, ~/.codex/AGENTS.md, both auto-loaded every
          # session) so an agent does not waste tokens trying to "fix" the
          # by-design read-only .git/config / .git/hooks (writes fail EBUSY).
          # Assert it lands after create, and that re-running post-create resets
          # the managed file idempotently without duplicating the block.
          devcontainer exec --workspace-folder . bash -lc '
            set -e
            begin="<!-- BEGIN aicontainer sandbox notes (managed) -->"
            for f in "$HOME/.claude/CLAUDE.md" "$HOME/.codex/AGENTS.md"; do
              [ -f "$f" ] || { echo "FAIL: $f missing"; exit 1; }
              grep -qF "$begin" "$f" || { echo "FAIL: $f missing managed marker"; exit 1; }
              grep -qF "Device or resource busy" "$f" || { echo "FAIL: $f missing EBUSY guidance"; exit 1; }
            done
            /usr/bin/python3 /opt/post-create.py
            for f in "$HOME/.claude/CLAUDE.md" "$HOME/.codex/AGENTS.md"; do
              n=$(grep -cF "$begin" "$f")
              [ "$n" = "1" ] || { echo "FAIL: $f has $n note blocks after re-run (want 1)"; exit 1; }
            done
            echo "OK: managed sandbox note in CLAUDE.md + AGENTS.md; reset is idempotent"
          '

      - name: Smoke test - prompt/code persistence is project-isolated
        working-directory: /tmp/proj
        run: |
          marker=AIC_PROJECT_A_INJECTION
          devcontainer exec --workspace-folder . bash -lc '
            set -euo pipefail
            marker=AIC_PROJECT_A_INJECTION
            printf "%s\n" "$marker" > "$HOME/.claude/CLAUDE.md"
            printf "{\"model\":\"%s\"}\n" "$marker" > "$HOME/.claude/settings.json"
            mkdir -p "$HOME/.claude/skills/aic-project-a"
            printf "%s\n" "$marker" > "$HOME/.claude/skills/aic-project-a/SKILL.md"
            printf "%s\n" "$marker" > "$HOME/.codex/AGENTS.md"
            printf "model = \"%s\"\n" "$marker" > "$HOME/.codex/config.toml"
            mkdir -p "$HOME/.codex/plugins/aic-project-a"
            printf "%s\n" "$marker" > "$HOME/.codex/plugins/aic-project-a/probe"
          '
          devcontainer up --workspace-folder . --remove-existing-container
          devcontainer exec --workspace-folder . bash -lc '
            set -euo pipefail
            marker=AIC_PROJECT_A_INJECTION
            for mapping in \
              "$HOME/.claude:$HOME/.aic-sessions/tool-homes/claude" \
              "$HOME/.codex:$HOME/.aic-sessions/tool-homes/codex" \
              "$HOME/.config/opencode:$HOME/.aic-sessions/tool-homes/opencode-config" \
              "$HOME/.local/share/opencode:$HOME/.aic-sessions/tool-homes/opencode-data"; do
              link=${mapping%%:*}
              target=${mapping#*:}
              [ -L "$link" ] || { echo "FAIL: canonical tool home is not a symlink: $link"; exit 1; }
              [ "$(readlink -f "$link")" = "$target" ] \
                || { echo "FAIL: $link does not resolve to $target"; exit 1; }
            done
            for private_dir in \
              "$HOME/.aic-sessions" \
              "$HOME/.aic-sessions/tool-homes/claude" \
              "$HOME/.aic-sessions/tool-homes/codex" \
              "$HOME/.aic-sessions/tool-homes/opencode-config" \
              "$HOME/.aic-sessions/tool-homes/opencode-data"; do
              [ "$(stat -c %a "$private_dir")" = 700 ] \
                || { echo "FAIL: private tool-home directory is not mode 0700: $private_dir"; exit 1; }
            done
            ! grep -Fq "$marker" "$HOME/.claude/CLAUDE.md" "$HOME/.claude/settings.json" \
                                "$HOME/.codex/AGENTS.md" "$HOME/.codex/config.toml"
            grep -Fq "$marker" "$HOME/.claude/skills/aic-project-a/SKILL.md"
            grep -Fq "$marker" "$HOME/.codex/plugins/aic-project-a/probe"
            for child in "$HOME/.config/aic-auth"/*; do
              case "$(basename "$child")" in signing|semgrep) ;; *) echo "FAIL: broad auth-root child exposed: $child"; exit 1 ;; esac
            done
            echo "OK: managed memory/config reset on recreate; project-local skills/plugins persist only here"
          '
          mkdir -p /tmp/proj-b
          git -C /tmp/proj-b init -q
          (cd /tmp/proj-b && AIC_HOME="$GITHUB_WORKSPACE" "$GITHUB_WORKSPACE/aic" init --build)
          devcontainer up --workspace-folder /tmp/proj-b
          devcontainer exec --workspace-folder /tmp/proj-b bash -lc '
            set -euo pipefail
            marker=AIC_PROJECT_A_INJECTION
            for path in "$HOME/.claude/CLAUDE.md" "$HOME/.claude/settings.json" \
                        "$HOME/.claude/skills" "$HOME/.claude/agents" \
                        "$HOME/.claude/commands" "$HOME/.claude/plugins" \
                        "$HOME/.codex/AGENTS.md" "$HOME/.codex/config.toml" \
                        "$HOME/.codex/skills" "$HOME/.codex/rules" \
                        "$HOME/.codex/prompts" "$HOME/.codex/plugins"; do
              [ -e "$path" ] || { echo "FAIL: isolated prompt/code surface missing: $path"; exit 1; }
              ! grep -R -Fq "$marker" "$path"
            done
            echo "OK: project A prompt/code injection is absent from project B"
          '

          # A login tool normally writes a temp file and atomically renames it.
          # Simulate that in project A, then prove only the exact credential
          # JSON reaches project B (with mode 0600), never settings/plugins.
          devcontainer exec --workspace-folder . bash -lc '
            set -euo pipefail
            atomic_login() {
              local destination=$1 payload=$2 temp="${1}.tmp"
              printf "%s\n" "$payload" > "$temp"
              chmod 600 "$temp"
              mv -f "$temp" "$destination"
            }
            atomic_login "$HOME/.claude/.credentials.json" \
              "{\"aic_auth_sync\":\"claude-smoke\"}"
            atomic_login "$HOME/.codex/auth.json" \
              "{\"aic_auth_sync\":\"codex-smoke\"}"
            atomic_login "$HOME/.local/share/opencode/auth.json" \
              "{\"aic_auth_sync\":\"opencode-auth-smoke\"}"
            atomic_login "$HOME/.local/share/opencode/account.json" \
              "{\"aic_auth_sync\":\"opencode-account-smoke\"}"
          '
          devcontainer exec --workspace-folder /tmp/proj-b bash -lc '
            set -euo pipefail
            wait_for_auth() {
              local path=$1 expected_digest=$2 actual_digest
              for _ in $(seq 1 30); do
                if [ -f "$path" ] \
                  && [ "$(stat -c %a "$path")" = 600 ]; then
                  actual_digest=$(sha256sum "$path" | awk "{print \$1}")
                  [ "$actual_digest" = "$expected_digest" ] && return 0
                fi
                sleep 1
              done
              echo "FAIL: credential did not synchronize safely: $path" >&2
              return 1
            }
            wait_for_auth "$HOME/.claude/.credentials.json" \
              514800cf3e74a800dc093b66bfb61e34054c34d292a3b96d7862980df307a264
            wait_for_auth "$HOME/.codex/auth.json" \
              b9954fe3bbe0f88eaeba2be8863dd22be60b69c688fafbbc3623200463edd32c
            wait_for_auth "$HOME/.local/share/opencode/auth.json" \
              225ae61218074d03262901bc5c0e73ede6978b99e6453c3b9ccf26117420864f
            wait_for_auth "$HOME/.local/share/opencode/account.json" \
              86efbd793af74336046205a631e6c3c7c59e46bd4d28c15ea5adae2a2f37c0bb

            atomic_login() {
              local destination=$1 payload=$2 temp="${1}.tmp"
              printf "%s\n" "$payload" > "$temp"
              chmod 600 "$temp"
              mv -f "$temp" "$destination"
            }
            atomic_login "$HOME/.local/share/opencode/auth.json" \
              "{\"aic_auth_sync\":\"opencode-auth-return\"}"
            atomic_login "$HOME/.local/share/opencode/account.json" \
              "{\"aic_auth_sync\":\"opencode-account-return\"}"
            echo "OK: exact Claude/Codex/OpenCode credential files arrived with mode 0600"
          '
          devcontainer exec --workspace-folder . bash -lc '
            set -euo pipefail
            wait_for_auth() {
              local path=$1 expected_digest=$2 actual_digest
              for _ in $(seq 1 30); do
                if [ -f "$path" ] \
                  && [ "$(stat -c %a "$path")" = 600 ]; then
                  actual_digest=$(sha256sum "$path" | awk "{print \$1}")
                  [ "$actual_digest" = "$expected_digest" ] && return 0
                fi
                sleep 1
              done
              echo "FAIL: credential did not round-trip safely: $path" >&2
              return 1
            }
            wait_for_auth "$HOME/.local/share/opencode/auth.json" \
              0e2de306b5141389bf9f0a6dc46ab4484f05e5198b5703ef74262e388f9a211c
            wait_for_auth "$HOME/.local/share/opencode/account.json" \
              bc63c0d43b23e2405525c73263880e5a1c461bc10ba8746656dcb212bd2937a2
            echo "OK: OpenCode auth.json/account.json round-trip exactly without logging payloads"
          '

          for workspace in /tmp/proj /tmp/proj-b; do
            project_name=$(sed -nE 's/^name:[[:space:]]*([^[:space:]]+).*$/\1/p' \
              "$workspace/.devcontainer/docker-compose.yml")
            expected_user=$(sed -nE 's/^AIC_RUNTIME_USER=([0-9]+:[0-9]+)$/\1/p' \
              "$workspace/.devcontainer/.env")
            [ -n "$expected_user" ] \
              || { echo "FAIL: managed runtime UID:GID missing for $workspace"; exit 1; }
            sync_id=$(docker ps -q \
              --filter "label=com.docker.compose.project=$project_name" \
              --filter "label=com.docker.compose.service=aic-auth-sync")
            [ -n "$sync_id" ] || { echo "FAIL: auth-sync container missing for $workspace"; exit 1; }
            docker inspect "$sync_id" | jq -e --arg user "$expected_user" '
              .[0]
              | .Config.User == $user
                and .HostConfig.NetworkMode == "none"
                and .HostConfig.ReadonlyRootfs == true
                and ((.HostConfig.CapDrop // []) | map(ascii_upcase) | index("ALL") != null)
                and ((.HostConfig.CapAdd // []) | length == 0)
                and ((.HostConfig.SecurityOpt // [])
                  | any(. == "no-new-privileges:true" or . == "no-new-privileges"))
                and .HostConfig.PidsLimit == 32
                and .State.Health.Status == "healthy"
            ' >/dev/null || { echo "FAIL: auth-sync hardening mismatch for $workspace"; exit 1; }
          done
          forbidden=$(docker exec "$sync_id" find /auth-global -mindepth 2 \
            \( -name settings.json -o -name config.toml -o -name CLAUDE.md \
               -o -name AGENTS.md -o -name skills -o -name plugins \) -print -quit)
          [ -z "$forbidden" ] \
            || { echo "FAIL: project config/prompt/plugin reached global auth: $forbidden"; exit 1; }
          echo "OK: auth-sync is networkless, read-only, capability-free, healthy, and credential-only"

      - name: Smoke test - missing git identity is flagged loudly at create time
        working-directory: /tmp/proj
        run: |
          # The sandbox has no identity of its own — its root-managed config
          # contains only the allowlisted host seed. An empty host gitconfig leaves
          # no identity in-container, and it can't be fixed from inside
          # (/etc/aic/user-config/gitconfig is root-locked; .git/config is RO), so
          # post-create must surface it loudly at create time. The runner starts
          # with no global identity (the signing test below sets it); unset
          # defensively, recreate, and assert post-create warned + identity is
          # genuinely absent. Keep this before the signing test (which sets it).
          set -euo pipefail
          git config --global --unset-all user.name  || true
          git config --global --unset-all user.email || true
          devcontainer up --workspace-folder . --remove-existing-container 2>&1 | tee /tmp/no-ident.log
          grep -q "git identity: no user.name/user.email is configured" /tmp/no-ident.log \
            || { echo "FAIL: post-create did not warn about missing git identity"; exit 1; }
          devcontainer exec --workspace-folder . bash -lc '
            set -euo pipefail
            [ -z "$(cd "$HOME" && git config --get user.email || true)" ] \
              || { echo "FAIL: identity unexpectedly present"; exit 1; }
          '
          echo "OK: missing git identity flagged at create time"

      - name: Smoke test - aic signing wires a sandbox signing key
        working-directory: /tmp/proj
        run: |
          # The host signing key is never forwarded, so signing here only works
          # via a sandbox-only key in aic-auth-global that post-create wires into
          # /etc/aic/user-config/gitconfig on (re)create. Stage a key the way `aic signing
          # auto` does, give the mounted host gitconfig a committer identity (so
          # post-create writes allowed_signers and verification can pass),
          # recreate, then assert signing is wired and a commit verifies.
          devcontainer exec --workspace-folder . bash -lc '
            set -euo pipefail
            dir="$HOME/.config/aic-auth/signing"; mkdir -p "$dir"
            ssh-keygen -t ed25519 -N "" -C ci-signing -f "$dir/id_ed25519" >/dev/null
            printf auto > "$dir/mode"
          '
          git config --global user.email ci@example.com
          git config --global user.name  "CI Signer"
          devcontainer up --workspace-folder . --remove-existing-container
          devcontainer exec --workspace-folder . bash -lc '
            set -euo pipefail
            key="$HOME/.config/aic-auth/signing/id_ed25519"
            managed=/etc/aic/user-config/gitconfig
            grep -qx "    gpgsign = true" "$managed" || { echo "FAIL: gpgsign not enabled"; cat "$managed"; exit 1; }
            grep -qF "signingkey = $key" "$managed" || { echo "FAIL: signingkey not wired into managed gitconfig"; cat "$managed"; exit 1; }
            # The managed config must STILL be root-locked after adding signing.
            perms=$(stat -c "%U %a" "$managed")
            [ "$perms" = "root 444" ] || { echo "FAIL: managed gitconfig not root-locked ($perms)"; exit 1; }
            cd /workspace
            git commit --allow-empty -m "signed commit" >/dev/null
            # %G? : G=good+verified, U=good signature (principal unverified),
            # N=unsigned, E=error. The core guarantee is that the sandbox key
            # actually SIGNS, so accept G or U and fail only on N/E. (Verified
            # vs unverified depends on the committer email matching
            # allowed_signers, which is best-effort.)
            v=$(git log -1 --format=%G?)
            echo "signature status: $v"
            case "$v" in
              G) echo "OK: commit signed and verified (G)" ;;
              U) echo "OK: commit signed (U: good signature, principal not in allowed_signers)" ;;
              *) echo "FAIL: expected a signature (G or U), got $v"; git log -1 --show-signature; exit 1 ;;
            esac
            echo "OK: sandbox signing key wired; managed gitconfig still root-locked; commit signed"
          '

      - name: CLI test - aic sync warns on / bumps a stale Dockerfile.project base
        run: |
          # Host-only (no container). A project-owned Dockerfile.project that
          # pins an old aicontainer base must NOT be silently edited by sync —
          # sync warns; only `--bump-base` rewrites the FROM. Guards the drift
          # footgun where an override's build: runs the stale base.
          set -euo pipefail
          tmp="$(mktemp -d)"; cd "$tmp"; git init -q
          cur="v$(node -p "require('$GITHUB_WORKSPACE/package.json').version")"
          AIC_HOME="$GITHUB_WORKSPACE" "$GITHUB_WORKSPACE/aic" init >/dev/null
          printf 'FROM ghcr.io/stefanoginella/aicontainer:v0.0.1\nRUN true\n' > .devcontainer/Dockerfile.project
          # 1) plain sync: must WARN and leave the file untouched
          out="$(AIC_HOME="$GITHUB_WORKSPACE" "$GITHUB_WORKSPACE/aic" sync 2>&1)"; echo "$out"
          echo "$out" | grep -q "Dockerfile.project pins .*:v0.0.1" || { echo "FAIL: no drift warning"; exit 1; }
          grep -Fxq 'FROM ghcr.io/stefanoginella/aicontainer:v0.0.1' .devcontainer/Dockerfile.project || { echo "FAIL: plain sync edited the file"; exit 1; }
          # 2) sync --bump-base: must rewrite FROM to this aic's version
          AIC_HOME="$GITHUB_WORKSPACE" "$GITHUB_WORKSPACE/aic" sync --bump-base >/dev/null
          grep -q "ghcr.io/stefanoginella/aicontainer:${cur}" .devcontainer/Dockerfile.project \
            || { echo "FAIL: --bump-base did not rewrite FROM to ${cur}"; cat .devcontainer/Dockerfile.project; exit 1; }
          grep -Fxq 'FROM ghcr.io/stefanoginella/aicontainer:v0.0.1' .devcontainer/Dockerfile.project && { echo "FAIL: stale tag still present"; exit 1; }
          echo "OK: sync warns on drift; --bump-base rewrites FROM to ${cur}"

      - name: CLI test - aic sync merges project-owned vscode-extensions / vscode-settings.json
        run: |
          # Host-only (no container). devcontainer.json is regenerated wholesale
          # each sync, so per-project editor config lives in two project-owned
          # files merged at the JSONC markers. Assert: valid ids + settings land,
          # invalid ids are rejected and don't leak into the file, the list is
          # deduped, and a second sync is idempotent.
          set -euo pipefail
          tmp="$(mktemp -d)"; cd "$tmp"; git init -q
          AIC_HOME="$GITHUB_WORKSPACE" "$GITHUB_WORKSPACE/aic" init >/dev/null
          # the in-repo guide ships in pull mode too
          test -f .devcontainer/README.md || { echo "FAIL: .devcontainer/README.md not shipped"; exit 1; }
          grep -q 'do NOT edit' .devcontainer/README.md || { echo "FAIL: README.md missing the do-not-edit guidance"; exit 1; }
          printf 'ms-python.python\ncharliermarsh.ruff\nms-python.python\n# a comment\nnot a valid id!!\n' > .devcontainer/vscode-extensions
          printf '{\n  "python.defaultInterpreterPath": "/workspace/.venv/bin/python",\n  "ruff.importStrategy": "fromEnvironment"\n}\n' > .devcontainer/vscode-settings.json
          out="$(AIC_HOME="$GITHUB_WORKSPACE" "$GITHUB_WORKSPACE/aic" sync 2>&1)"; echo "$out"
          echo "$out" | grep -q "ignoring invalid vscode-extensions entry: not a valid id" || { echo "FAIL: invalid id not rejected"; exit 1; }
          dc=.devcontainer/devcontainer.json
          grep -q '"ms-python.python"'             "$dc" || { echo "FAIL: extension not merged"; exit 1; }
          grep -q '"charliermarsh.ruff"'           "$dc" || { echo "FAIL: extension not merged"; exit 1; }
          grep -q '"python.defaultInterpreterPath"' "$dc" || { echo "FAIL: setting not merged"; exit 1; }
          grep -q 'not a valid id' "$dc" && { echo "FAIL: invalid id leaked into devcontainer.json"; exit 1; }
          [ "$(grep -c '"ms-python.python"' "$dc")" = "1" ] || { echo "FAIL: extension not deduped"; exit 1; }
          cp "$dc" "$tmp/dc-before"
          AIC_HOME="$GITHUB_WORKSPACE" "$GITHUB_WORKSPACE/aic" sync >/dev/null 2>&1
          diff -u "$tmp/dc-before" "$dc" || { echo "FAIL: merge not idempotent"; exit 1; }
          echo "OK: vscode-extensions/settings merged, invalid id rejected, deduped, idempotent"

      - name: CLI test - drift warning works; trusted initialize is wired
        run: |
          # Host-only (no container). The pinned-vs-CLI drift warning must also
          # reach VS Code "Reopen/Rebuild in Container", which drives
          # `devcontainer up` directly and never `aic up`: the template's
          # initializeCommand calls the fail-closed `aic initialize`. Assert the
          # reusable drift probe warns only on mismatch, honors the opt-out, and
          # the full trusted initializer (validation + migration) is wired in.
          set -euo pipefail
          tmp="$(mktemp -d)"; cd "$tmp"; git init -q
          AIC_HOME="$GITHUB_WORKSPACE" "$GITHUB_WORKSPACE/aic" init >/dev/null
          # init pins the current version -> no drift -> check-drift is silent.
          out="$(AIC_HOME="$GITHUB_WORKSPACE" "$GITHUB_WORKSPACE/aic" check-drift 2>&1)"
          [ -z "$out" ] || { echo "FAIL: check-drift warned with no drift: $out"; exit 1; }
          # Force drift by repinning the compose tag to a bogus version.
          sed -i -E 's#(aicontainer:)v[0-9]+\.[0-9]+\.[0-9]+#\1v9.9.9#' .devcontainer/docker-compose.yml
          out="$(AIC_HOME="$GITHUB_WORKSPACE" "$GITHUB_WORKSPACE/aic" check-drift 2>&1)"; echo "$out"
          echo "$out" | grep -q "pins the v9.9.9 image" || { echo "FAIL: check-drift did not warn on drift"; exit 1; }
          # AIC_NO_UPDATE_CHECK silences it; exit stays 0 either way.
          out="$(AIC_NO_UPDATE_CHECK=1 AIC_HOME="$GITHUB_WORKSPACE" "$GITHUB_WORKSPACE/aic" check-drift 2>&1)"
          [ -z "$out" ] || { echo "FAIL: AIC_NO_UPDATE_CHECK did not silence check-drift: $out"; exit 1; }
          grep -Fq 'exec \"$aic_bin\" initialize' .devcontainer/devcontainer.json || { echo "FAIL: initializeCommand missing trusted aic initialize wiring"; exit 1; }
          echo "OK: drift warning is precise and VS Code uses the fail-closed initializer"

      - name: CLI test - Docker API read and write access are separate opt-ins
        run: |
          # Host-only (no container). Default exposes only ping/version;
          # --docker-read enables Docker metadata, and --docker additionally
          # enables writes. Each explicit mode must survive a plain sync.
          set -euo pipefail
          tmp="$(mktemp -d)"; cd "$tmp"; git init -q
          dc=.devcontainer/docker-compose.yml
          read_keys=(CONTAINERS EVENTS IMAGES INFO NETWORKS VOLUMES)
          assert_toggle() {
            local key=$1 value=$2
            grep -qE "^[[:space:]]*${key}:[[:space:]]*${value}[[:space:]]*$" "$dc" \
              || { echo "FAIL: expected ${key}: ${value}"; grep -nE "${key}|POST|BUILD" "$dc"; exit 1; }
          }
          AIC_HOME="$GITHUB_WORKSPACE" "$GITHUB_WORKSPACE/aic" init >/dev/null
          for key in "${read_keys[@]}"; do assert_toggle "$key" 0; done
          assert_toggle VERSION 1
          assert_toggle PING 1
          assert_toggle POST 0
          assert_toggle BUILD 0
          grep -qE '^[[:space:]]*pids_limit:[[:space:]]*[0-9]+'    "$dc" || { echo "FAIL: pids_limit missing"; exit 1; }

          AIC_HOME="$GITHUB_WORKSPACE" "$GITHUB_WORKSPACE/aic" sync --docker-read >/dev/null
          for key in "${read_keys[@]}"; do assert_toggle "$key" 1; done
          assert_toggle POST 0
          assert_toggle BUILD 0
          AIC_HOME="$GITHUB_WORKSPACE" "$GITHUB_WORKSPACE/aic" sync >/dev/null
          assert_toggle CONTAINERS 1

          AIC_HOME="$GITHUB_WORKSPACE" "$GITHUB_WORKSPACE/aic" sync --docker >/dev/null
          for key in "${read_keys[@]}"; do assert_toggle "$key" 1; done
          assert_toggle POST 1
          assert_toggle BUILD 1
          AIC_HOME="$GITHUB_WORKSPACE" "$GITHUB_WORKSPACE/aic" sync >/dev/null
          assert_toggle POST 1

          AIC_HOME="$GITHUB_WORKSPACE" "$GITHUB_WORKSPACE/aic" sync --no-docker >/dev/null
          for key in "${read_keys[@]}"; do assert_toggle "$key" 0; done
          assert_toggle POST 0
          assert_toggle BUILD 0
          echo "OK: Docker none/read/write modes are explicit, sync-stable, and default to none"

      - name: CLI test - project override scan flags host-access grants before up
        run: |
          # Host-only (no container). Project-owned docker-compose.override.yml /
          # Dockerfile.project ride along in an untrusted repo and ARE honored on
          # `aic up` (the override is auto-wired into dockerComposeFile). The pre-up
          # scan — surfaced host-side by both `aic check-drift` and VS Code's
          # `aic initialize` structural gate — must flag privileged,
          # cap_add, host mounts, the Docker socket, and a non-aicontainer base,
          # stay silent on a clean project, and honor the opt-out.
          set -euo pipefail
          tmp="$(mktemp -d)"; cd "$tmp"; git init -q
          AIC_HOME="$GITHUB_WORKSPACE" "$GITHUB_WORKSPACE/aic" init >/dev/null
          out="$(AIC_HOME="$GITHUB_WORKSPACE" "$GITHUB_WORKSPACE/aic" check-drift 2>&1)"
          echo "$out" | grep -q "request extra host access" && { echo "FAIL: clean project flagged"; echo "$out"; exit 1; }
          printf 'services:\n  devcontainer:\n    privileged: true\n    cap_add:\n      - SYS_ADMIN\n    volumes:\n      - /:/host\n      - /var/run/docker.sock:/var/run/docker.sock\n' \
            > .devcontainer/docker-compose.override.yml
          out="$(AIC_HOME="$GITHUB_WORKSPACE" "$GITHUB_WORKSPACE/aic" check-drift 2>&1)"; echo "$out"
          echo "$out" | grep -q "privileged: true"    || { echo "FAIL: privileged not flagged"; exit 1; }
          echo "$out" | grep -q "cap_add"             || { echo "FAIL: cap_add not flagged"; exit 1; }
          echo "$out" | grep -q "Docker socket"       || { echo "FAIL: docker.sock not flagged"; exit 1; }
          echo "$out" | grep -q "sensitive host path" || { echo "FAIL: host mount not flagged"; exit 1; }
          printf 'FROM ubuntu:24.04\nRUN true\n' > .devcontainer/Dockerfile.project
          AIC_HOME="$GITHUB_WORKSPACE" "$GITHUB_WORKSPACE/aic" check-drift 2>&1 \
            | grep -q "not the aicontainer base" || { echo "FAIL: non-aicontainer base not flagged"; exit 1; }
          out="$(AIC_NO_OVERRIDE_SCAN=1 AIC_HOME="$GITHUB_WORKSPACE" "$GITHUB_WORKSPACE/aic" check-drift 2>&1)"
          echo "$out" | grep -q "request extra host access" && { echo "FAIL: AIC_NO_OVERRIDE_SCAN did not silence the scan"; exit 1; }
          echo "OK: scan flags privileged/caps/socket/host-mount/non-base; clean project silent; opt-out honored"

  publish:
    # Refresh `:latest` and the weekly tag on every push to main that touches
    # template files, the weekly cron, or manual dispatch — never on PRs (forks
    # would otherwise be able to push to GHCR with the workflow's permissions).
    # This is a *security refresh* track: it keeps base layers / hooks fresh
    # for users pulling `:latest`, independent of npm releases. Release-time
    # publishes (npm + `:vX.Y.Z`) live in release.yml and trigger on `v*` tags.
    if: github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: [build, smoke]
    # release.yml mutates the same GHCR repository. Keep the registry writes
    # mutually exclusive across both workflows so neither can pass a
    # read-before-write guard and then overwrite the other's newer :latest.
    concurrency:
      group: aicontainer-registry-publish
      cancel-in-progress: false
      queue: max
    permissions:
      contents: read
      packages: write
    env:
      OWNER: ${{ github.repository_owner }}
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Refuse a stale template source
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail
          git fetch --no-tags origin "+refs/heads/${DEFAULT_BRANCH}:refs/remotes/origin/${DEFAULT_BRANCH}"
          if ! git diff --quiet HEAD "refs/remotes/origin/${DEFAULT_BRANCH}" -- template; then
            echo "This run's template differs from current ${DEFAULT_BRANCH}; refusing to roll mutable GHCR tags backward." >&2
            exit 1
          fi
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute weekly tag
        id: tag
        run: |
          echo "week=$(date -u +%Y-%V)" >> "$GITHUB_OUTPUT"
          echo "created=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
      - name: Build and push to GHCR
        uses: docker/build-push-action@v7
        with:
          context: template
          platforms: linux/amd64,linux/arm64
          push: true
          pull: true
          no-cache: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
          tags: |
            ghcr.io/${{ env.OWNER }}/aicontainer:latest
            ghcr.io/${{ env.OWNER }}/aicontainer:weekly-${{ steps.tag.outputs.week }}
          annotations: |
            index:org.opencontainers.image.created=${{ steps.tag.outputs.created }}
            index:org.opencontainers.image.revision=${{ github.sha }}
            index:org.opencontainers.image.version=weekly-${{ steps.tag.outputs.week }}
            index:io.aicontainer.channel=security-refresh
          cache-from: type=gha
          cache-to: type=gha,mode=max
