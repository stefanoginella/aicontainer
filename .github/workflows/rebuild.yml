name: rebuild

on:
  schedule:
    - cron: '0 6 * * 1'
  push:
    branches: [main]
    # Anything under template/ is baked into the image or is the compose/
    # devcontainer the smoke job exercises, so a glob is both correct and
    # self-maintaining — an enumerated list silently drifted (it named a
    # nonexistent template/docker-compose.yml; the real files are
    # docker-compose.{pull,build}.yml, and template/.zshrc was never listed).
    paths:
      - template/**
      - .github/workflows/rebuild.yml
  pull_request:
    paths:
      - template/**
      - .github/workflows/rebuild.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

# Supersede stale rebuilds: a newer push to the same ref cancels an older
# in-flight rebuild — it would only publish a now-stale :latest. Safe because
# :latest / :weekly are mutable and the newer run re-publishes them.
concurrency:
  group: rebuild-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - name: Build multi-arch (no push, validates build)
        uses: docker/build-push-action@v7
        with:
          context: template
          platforms: linux/amd64,linux/arm64
          push: false
          tags: aicontainer:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  smoke:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6
      - name: Install devcontainer CLI
        run: npm install -g @devcontainers/cli@latest
      - name: Stage a throwaway project (exercises `aic init --build`)
        run: |
          mkdir -p /tmp/proj
          cd /tmp/proj && git init -q
          AIC_HOME="$GITHUB_WORKSPACE" "$GITHUB_WORKSPACE/aic" init --build
      - name: Bring up the devcontainer
        working-directory: /tmp/proj
        run: devcontainer up --workspace-folder .
      - name: Smoke test - AI CLIs resolve
        working-directory: /tmp/proj
        run: |
          devcontainer exec --workspace-folder . claude --version
          devcontainer exec --workspace-folder . bash -lc 'eval "$(fnm env)" && codex --version'
          devcontainer exec --workspace-folder . gh --version
          devcontainer exec --workspace-folder . uv --version
      - name: Smoke test - socket-proxy reachable, EXEC blocked
        working-directory: /tmp/proj
        run: |
          devcontainer exec --workspace-folder . curl -fsS http://socket-proxy:2375/_ping
          set +e
          out=$(devcontainer exec --workspace-folder . curl -s -o /dev/null -w '%{http_code}' \
            -X POST http://socket-proxy:2375/exec/none/start)
          set -e
          [ "$out" = "403" ] || { echo "expected 403 from socket-proxy /exec, got $out"; exit 1; }
      - name: Smoke test - npm quarantine window is sane (npx-based MCPs installable)
        working-directory: /tmp/proj
        run: |
          devcontainer exec --workspace-folder . bash -lc '
            val="${NPM_CONFIG_MIN_RELEASE_AGE-}"
            echo "NPM_CONFIG_MIN_RELEASE_AGE=$val"
            [ -n "$val" ] || { echo "FAIL: NPM_CONFIG_MIN_RELEASE_AGE unset"; exit 1; }
            [ "$val" -ge 0 ] 2>/dev/null || { echo "FAIL: not a non-negative integer"; exit 1; }
            # npm interprets this value in DAYS. Anything > 30 makes most active
            # npx-based MCP plugins unusable; almost certainly a unit mistake
            # (e.g. believing 1440 means 24h in minutes — it means 1440 days).
            [ "$val" -le 30 ] || { echo "FAIL: $val days is too restrictive; npx MCPs will fail with ENOVERSIONS"; exit 1; }
            echo "OK: npm quarantine is ${val} day(s)"
          '

      - name: Smoke test - PreToolUse hook blocks .env
        working-directory: /tmp/proj
        run: |
          devcontainer exec --workspace-folder . bash -lc '
            cd /workspace
            printf "SECRET=hunter2\n" > .env
            payload='\''{"tool_name":"Read","tool_input":{"file_path":"/workspace/.env"}}'\''
            if echo "$payload" | /etc/aic/hooks/pre-tool-use.sh; then
              echo "hook FAILED to block .env"
              exit 1
            else
              echo "hook correctly blocked .env"
            fi
          '

      - name: Smoke test - scoped sudo cannot chown arbitrary paths
        working-directory: /tmp/proj
        run: |
          devcontainer exec --workspace-folder . bash -lc '
            sudo -n /usr/local/bin/aic-chown-volumes
            if sudo -nl /usr/bin/chown 2>/dev/null | grep -q chown; then
              echo "FAIL: /usr/bin/chown still in NOPASSWD sudoers"
              exit 1
            fi
            echo "OK: arbitrary sudo chown is denied"
          '

      - name: Smoke test - chown-paths allowlist is enforced
        working-directory: /tmp/proj
        run: |
          # chown-paths is RO-mounted + PreToolUse-blocked, so an in-container
          # tool can't add entries. But a forbidden entry (e.g. a careless
          # host-side edit) must still be refused fail-closed without touching
          # the target. We write it host-side; the live RO bind mount reflects
          # it inside the container.
          trap 'rm -rf .devcontainer/chown-paths .venv-smoke' EXIT
          printf '/home/vscode/.gitconfig.local\n' > .devcontainer/chown-paths
          devcontainer exec --workspace-folder . bash -lc '
            sudo -n /usr/local/bin/aic-chown-volumes && { echo "FAIL: accepted out-of-allowlist path"; exit 1; }
            owner=$(stat -c "%U" /home/vscode/.gitconfig.local)
            [ "$owner" = "root" ] || { echo "FAIL: gitconfig.local now owned by $owner"; exit 1; }
            echo "OK: forbidden chown-paths entry refused; gitconfig.local still root-owned"
          '
          printf '/workspace/.venv-smoke\n' > .devcontainer/chown-paths
          devcontainer exec --workspace-folder . bash -lc '
            mkdir -p /workspace/.venv-smoke
            sudo -n /usr/local/bin/aic-chown-volumes || { echo "FAIL: rejected a valid /workspace path"; exit 1; }
            echo "OK: valid /workspace chown-paths entry accepted"
          '

      - name: Smoke test - self-protection files are root-owned 0444
        working-directory: /tmp/proj
        run: |
          # gitconfig.local + the baked login-shell rc files are all root-locked
          # by aic-lock-gitconfig so a tool session can't capture git creds or
          # plant a payload that runs on the next `aic shell`.
          devcontainer exec --workspace-folder . bash -lc '
            for f in /home/vscode/.gitconfig.local \
                     /home/vscode/.zshrc \
                     /home/vscode/.bashrc \
                     /home/vscode/.config/fish/config.fish; do
              [ -e "$f" ] || { echo "FAIL: $f missing (should be locked)"; exit 1; }
              perms=$(stat -c "%U %a" "$f")
              echo "$f perms: $perms"
              [ "$perms" = "root 444" ] || { echo "FAIL: $f expected root 444, got $perms"; exit 1; }
              if echo "x" >> "$f" 2>/dev/null; then
                echo "FAIL: vscode can still write to $f"; exit 1
              fi
            done
            echo "OK: gitconfig.local + shell rc files are locked"
          '

      - name: Smoke test - project post-create hook runs (vscode, /workspace, non-fatal, clean VIRTUAL_ENV)
        working-directory: /tmp/proj
        run: |
          # post-create.project.sh is opt-in by presence and RO-mounted; the
          # live bind mount reflects this host-side write inside the container.
          # post-create only runs at create time, so re-invoke it directly to
          # exercise run_project_hook (mirrors how the chown-paths test re-runs
          # the wrapper). The hook exits non-zero on purpose: post-create must
          # warn-and-continue (exit 0), never propagate the failure. It also
          # records VIRTUAL_ENV: postCreateCommand is `uv run --no-project`,
          # which activates an ephemeral env for post-create itself; that must
          # NOT leak into the hook (else a project `uv sync` warns it doesn't
          # match .venv), so run_project_hook strips it before running the hook.
          trap 'rm -f .devcontainer/post-create.project.sh .aic-hook-evidence' EXIT
          cat > .devcontainer/post-create.project.sh <<'SH'
          #!/usr/bin/env bash
          set -euo pipefail
          { echo "user=$(whoami)"; echo "pwd=$(pwd)"; echo "venv=${VIRTUAL_ENV:-}"; } > /workspace/.aic-hook-evidence
          exit 3
          SH
          devcontainer exec --workspace-folder . bash -lc '
            rm -f /workspace/.aic-hook-evidence
            uv run --no-project /opt/post-create.py || { echo "FAIL: post-create propagated the hook non-zero exit"; exit 1; }
            [ -f /workspace/.aic-hook-evidence ] || { echo "FAIL: project hook did not run"; exit 1; }
            grep -qx "user=vscode"    /workspace/.aic-hook-evidence || { echo "FAIL: hook not run as vscode"; cat /workspace/.aic-hook-evidence; exit 1; }
            grep -qx "pwd=/workspace" /workspace/.aic-hook-evidence || { echo "FAIL: hook cwd not /workspace"; cat /workspace/.aic-hook-evidence; exit 1; }
            if grep -q "environments-v2/post-create" /workspace/.aic-hook-evidence; then echo "FAIL: hook inherited post-create ephemeral VIRTUAL_ENV"; cat /workspace/.aic-hook-evidence; exit 1; fi
            echo "OK: project hook ran as vscode in /workspace; non-zero exit non-fatal; no leaked VIRTUAL_ENV"
          '

      - name: Smoke test - aic signing wires a sandbox signing key
        working-directory: /tmp/proj
        run: |
          # The host signing key is never forwarded, so signing here only works
          # via a sandbox-only key in aic-auth-global that post-create wires into
          # ~/.gitconfig.local on (re)create. Stage a key the way `aic signing
          # auto` does, give the mounted host gitconfig a committer identity (so
          # post-create writes allowed_signers and verification can pass),
          # recreate, then assert signing is wired and a commit verifies.
          devcontainer exec --workspace-folder . bash -lc '
            set -euo pipefail
            dir="$HOME/.config/aic-auth/signing"; mkdir -p "$dir"
            ssh-keygen -t ed25519 -N "" -C ci-signing -f "$dir/id_ed25519" >/dev/null
            printf auto > "$dir/mode"
          '
          git config --global user.email ci@example.com
          git config --global user.name  "CI Signer"
          devcontainer up --workspace-folder . --remove-existing-container
          devcontainer exec --workspace-folder . bash -lc '
            set -euo pipefail
            key="$HOME/.config/aic-auth/signing/id_ed25519"
            grep -qx "    gpgsign = true" ~/.gitconfig.local || { echo "FAIL: gpgsign not enabled"; cat ~/.gitconfig.local; exit 1; }
            grep -qF "signingkey = $key" ~/.gitconfig.local || { echo "FAIL: signingkey not wired into ~/.gitconfig.local"; cat ~/.gitconfig.local; exit 1; }
            # ~/.gitconfig.local must STILL be root-locked after adding signing.
            perms=$(stat -c "%U %a" ~/.gitconfig.local)
            [ "$perms" = "root 444" ] || { echo "FAIL: gitconfig.local not root-locked ($perms)"; exit 1; }
            cd /workspace
            git commit --allow-empty -m "signed commit" >/dev/null
            # %G? : G=good+verified, U=good signature (principal unverified),
            # N=unsigned, E=error. The core guarantee is that the sandbox key
            # actually SIGNS, so accept G or U and fail only on N/E. (Verified
            # vs unverified depends on the committer email matching
            # allowed_signers, which is best-effort.)
            v=$(git log -1 --format=%G?)
            echo "signature status: $v"
            case "$v" in
              G) echo "OK: commit signed and verified (G)" ;;
              U) echo "OK: commit signed (U: good signature, principal not in allowed_signers)" ;;
              *) echo "FAIL: expected a signature (G or U), got $v"; git log -1 --show-signature; exit 1 ;;
            esac
            echo "OK: sandbox signing key wired; gitconfig.local still root-locked; commit signed"
          '

      - name: CLI test - aic sync warns on / bumps a stale Dockerfile.project base
        run: |
          # Host-only (no container). A project-owned Dockerfile.project that
          # pins an old aicontainer base must NOT be silently edited by sync —
          # sync warns; only `--bump-base` rewrites the FROM. Guards the drift
          # footgun where an override's build: runs the stale base.
          set -euo pipefail
          tmp="$(mktemp -d)"; cd "$tmp"; git init -q
          cur="v$(node -p "require('$GITHUB_WORKSPACE/package.json').version")"
          AIC_HOME="$GITHUB_WORKSPACE" "$GITHUB_WORKSPACE/aic" init >/dev/null
          printf 'FROM ghcr.io/stefanoginella/aicontainer:v0.0.1\nRUN true\n' > .devcontainer/Dockerfile.project
          # 1) plain sync: must WARN and leave the file untouched
          out="$(AIC_HOME="$GITHUB_WORKSPACE" "$GITHUB_WORKSPACE/aic" sync 2>&1)"; echo "$out"
          echo "$out" | grep -q "Dockerfile.project pins .*:v0.0.1" || { echo "FAIL: no drift warning"; exit 1; }
          grep -Fxq 'FROM ghcr.io/stefanoginella/aicontainer:v0.0.1' .devcontainer/Dockerfile.project || { echo "FAIL: plain sync edited the file"; exit 1; }
          # 2) sync --bump-base: must rewrite FROM to this aic's version
          AIC_HOME="$GITHUB_WORKSPACE" "$GITHUB_WORKSPACE/aic" sync --bump-base >/dev/null
          grep -q "ghcr.io/stefanoginella/aicontainer:${cur}" .devcontainer/Dockerfile.project \
            || { echo "FAIL: --bump-base did not rewrite FROM to ${cur}"; cat .devcontainer/Dockerfile.project; exit 1; }
          grep -Fxq 'FROM ghcr.io/stefanoginella/aicontainer:v0.0.1' .devcontainer/Dockerfile.project && { echo "FAIL: stale tag still present"; exit 1; }
          echo "OK: sync warns on drift; --bump-base rewrites FROM to ${cur}"

  publish:
    # Refresh `:latest` and the weekly tag on every push to main that touches
    # template files, the weekly cron, or manual dispatch — never on PRs (forks
    # would otherwise be able to push to GHCR with the workflow's permissions).
    # This is a *security refresh* track: it keeps base layers / hooks fresh
    # for users pulling `:latest`, independent of npm releases. Release-time
    # publishes (npm + `:vX.Y.Z`) live in release.yml and trigger on `v*` tags.
    if: github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: [build, smoke]
    env:
      OWNER: ${{ github.repository_owner }}
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute weekly tag
        id: tag
        run: echo "week=$(date -u +%Y-%V)" >> "$GITHUB_OUTPUT"
      - name: Build and push to GHCR
        uses: docker/build-push-action@v7
        with:
          context: template
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ env.OWNER }}/aicontainer:latest
            ghcr.io/${{ env.OWNER }}/aicontainer:weekly-${{ steps.tag.outputs.week }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
