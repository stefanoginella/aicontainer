# =============================================================================
# aicontainer — pull-mode compose (uses the prebuilt GHCR image)
# =============================================================================
# Pulls ghcr.io/stefanoginella/aicontainer:latest instead of building locally.
# All helper scripts (post-create.py, aic-firewall, hooks, etc.) are baked
# into the image — see template/Dockerfile in the aicontainer repo for the
# source of truth.
#
# If a project needs extra apt packages or language tooling, run `aic init
# --build` to switch to the local-build template (or add a Dockerfile.project
# that does `FROM ghcr.io/stefanoginella/aicontainer:latest`).
# =============================================================================

# Managed placeholder: `aic init` / `aic sync` replace this with a stable name
# derived from the absolute project path. Keep the literal value sed-friendly.
name: aic-project

# `.devcontainer/.env` is generated and gitignored by `aic initialize`; it
# supplies the UID:GID Dev Containers will use (Linux host uid, or 1000 on
# Docker Desktop), so the no-capability auth-sync sidecar can keep credentials
# mode 0600 without creating machine-specific diffs in this managed file.
x-aic-runtime-user: &aic-runtime-user "${AIC_RUNTIME_USER:-1000:1000}"

services:
  devcontainer:
    image: ghcr.io/stefanoginella/aicontainer:latest
    pull_policy: missing
    command: sleep infinity
    # Bound a runaway agent (fork bomb / accidental infinite spawn) so it can't
    # exhaust host PIDs. Generous enough for normal dev (parallel builds, browser
    # automation); raise it in docker-compose.override.yml if a workload needs
    # more. Add mem_limit / cpus there too if you want to cap memory or CPU.
    pids_limit: 4096
    # Start from no Linux capabilities, then add only what the three fixed sudo
    # helpers need: ownership/permission changes (including traversal of old-UID
    # 0700 volume trees), sudo's uid/gid transition, and firewall rules in this
    # container's network namespace. NET_RAW is not needed and remains dropped.
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_READ_SEARCH
      - FOWNER
      - SETGID
      - SETUID
      - NET_ADMIN
    environment:
      DOCKER_HOST: tcp://socket-proxy:2375
    depends_on:
      aic-auth-sync:
        condition: service_healthy
      aic-seed-sanitizer:
        condition: service_completed_successfully
      socket-proxy:
        condition: service_healthy
    volumes:
      # Workspace (RW). `..` resolves to the project root since compose runs
      # from .devcontainer/.
      - ..:/workspace:cached

      # Self-protection: AI cannot rewrite its own runArgs / hook script.
      - ../.devcontainer:/workspace/.devcontainer:ro
      - ../.git/config:/workspace/.git/config:ro
      - ../.git/hooks:/workspace/.git/hooks:ro
      # Reserved helper-only socket path. /run/aic-host is root:root 0700 in the
      # image, so vscode cannot traverse/open this mount.
      - type: bind
        source: ${AIC_DOCKER_SOCKET:-/var/run/docker.sock}
        target: /run/aic-host/docker.sock
        read_only: true

      # The long-running unrestricted user sees only fixed allowlisted JSON
      # emitted by the root-only, networkless sanitizer service below — never
      # the raw host git/Claude/Codex/OpenCode files.
      - aic-sanitized-seed:/host-seed:ro

      # Persistence — see README "Multi-project model". All Claude/Codex/
      # OpenCode config, prompts, plugins, and sessions live below this one
      # per-project volume. Only the credential-sync sidecar sees the global
      # tool-auth directories.
      - aic-shell-history:/home/vscode/.shell-history
      - aic-sessions:/home/vscode/.aic-sessions
      - type: volume
        source: aic-auth-global
        target: /home/vscode/.config/gh
        volume:
          subpath: gh
      # NPM_CONFIG_USERCONFIG (set in devcontainer.json) points npm at
      # /home/vscode/.config/npm/npmrc, so `npm login` tokens land in this
      # volume subpath and survive rebuild. Same atomic-rename consideration
      # as claude/codex above — we mount the parent dir, not the file.
      - type: volume
        source: aic-auth-global
        target: /home/vscode/.config/npm
        volume:
          subpath: npm
      # Expose only the two fixed shared helper-data subpaths here. Mounting the
      # auth volume root would give every project an alternate path to every
      # other tool's credentials and auto-loaded prompt/code directories.
      - type: volume
        source: aic-auth-global
        target: /home/vscode/.config/aic-auth/signing
        volume:
          subpath: signing
      - type: volume
        source: aic-auth-global
        target: /home/vscode/.config/aic-auth/semgrep
        volume:
          subpath: semgrep

  # Credential bridge: the only service that sees both the shared tool-login
  # dirs and this project's sessions volume. It validates and atomically syncs
  # four exact JSON files; no config/prompt/plugin path is shared. The main
  # container waits for its initial newer-wins reconciliation before starting.
  aic-auth-sync:
    image: ghcr.io/stefanoginella/aicontainer:latest
    pull_policy: missing
    user: *aic-runtime-user
    command: ["/usr/bin/python3", "-I", "/opt/post-create.py", "auth-sync"]
    restart: unless-stopped
    network_mode: none
    privileged: false
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 32
    stop_grace_period: 3s
    environment:
      PYTHONDONTWRITEBYTECODE: "1"
    tmpfs:
      # The service runs as the dynamically mapped non-root user. This tmpfs is
      # private to the one-process container; sticky 1777 lets it publish the
      # readiness sentinel without adding a capability or writable rootfs.
      - /run:rw,nosuid,nodev,noexec,size=1m,mode=1777
    volumes:
      - aic-sessions:/project-sessions
      - type: volume
        source: aic-auth-global
        target: /auth-global/claude
        volume:
          subpath: claude
      - type: volume
        source: aic-auth-global
        target: /auth-global/codex
        volume:
          subpath: codex
      - type: volume
        source: aic-auth-global
        target: /auth-global/opencode
        volume:
          subpath: opencode
    healthcheck:
      test: ["CMD", "/usr/bin/test", "-f", "/run/aic-auth-sync.ready"]
      interval: 1s
      timeout: 1s
      retries: 30
      start_period: 1s

  # Reserved security service: the only container that sees raw host config.
  # Fixed command, no network/workspace/auth/session mounts, read-only rootfs,
  # and one narrowly justified capability (0600 host files may have another
  # uid). Its root-owned JSON products are mounted RO into devcontainer above.
  aic-seed-sanitizer:
    image: ghcr.io/stefanoginella/aicontainer:latest
    pull_policy: missing
    user: "0:0"
    command: ["/usr/bin/python3", "-I", "/opt/post-create.py", "sanitize-seeds"]
    network_mode: none
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - DAC_OVERRIDE
    pids_limit: 64
    environment:
      PYTHONDONTWRITEBYTECODE: "1"
    tmpfs:
      - /tmp:rw,nosuid,nodev,noexec,size=16m
    volumes:
      - ${HOME}/.gitconfig:/raw-host-seed/gitconfig:ro
      - ${HOME}/.claude/settings.json:/raw-host-seed/claude-settings.json:ro
      - ${HOME}/.codex/config.toml:/raw-host-seed/codex-config.toml:ro
      - ${HOME}/.config/opencode/opencode.json:/raw-host-seed/opencode.json:ro
      - aic-sanitized-seed:/sanitized-host-seed

  socket-proxy:
    # Digest-pin the multi-arch index: this service holds the raw host socket.
    image: tecnativa/docker-socket-proxy:v0.4.2@sha256:1f3a6f303320723d199d2316a3e82b2e2685d86c275d5e3deeaf182573b47476
    restart: unless-stopped
    privileged: false
    read_only: true
    tmpfs:
      - /run
      # 0.4.x writes the rendered haproxy.cfg to /tmp/haproxy.cfg on startup.
      - /tmp
    volumes:
      - type: bind
        source: ${AIC_DOCKER_SOCKET:-/var/run/docker.sock}
        target: /var/run/docker.sock
        read_only: true
      # haproxy 3.x in 0.4.x loads /var/lib/haproxy/server-state on startup;
      # an anonymous volume seeds it from the image (the file is pre-touched
      # in the Dockerfile) while keeping the path writable.
      - /var/lib/haproxy
    environment:
      # Host object reads are OFF by default: an unrestricted agent does not
      # need visibility into unrelated containers, images, networks, or
      # volumes. `aic init/sync --docker-read` flips these six toggles to 1;
      # `--docker` does the same and enables writes below.
      CONTAINERS: 0
      EVENTS: 0
      IMAGES: 0
      INFO: 0
      NETWORKS: 0
      VOLUMES: 0
      # Keep only the minimal liveness/version surface in the default mode.
      VERSION: 1
      PING: 1

      # Writes — creating/starting containers and building images on the HOST
      # daemon. OFF by default: with POST enabled an in-container agent can
      # `docker run --privileged -v /:/host` and escape to the host, and can
      # spawn sibling containers that bypass the opt-in aic-firewall (they get
      # their own netns). Opt in per-project with `aic init --docker` (or
      # `aic sync --docker`) only when you need testcontainers / in-container
      # `docker compose` — that flips these two toggles to 1.
      POST: 0
      BUILD: 0

      # Hard NO — blocks the cheap escapes.
      EXEC: 0
      AUTH: 0
      SECRETS: 0
      SWARM: 0
      SYSTEM: 0
      SERVICES: 0
      TASKS: 0
      CONFIGS: 0
      PLUGINS: 0
      NODES: 0
      DISTRIBUTION: 0
      SESSION: 0
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:2375/_ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

volumes:
  # Global — shared across all aicontainer projects on this host. Declared
  # `external` so Compose adopts each volume by name without stamping it with a
  # per-project owner label. Without this, the first project to start claims
  # them and every *other* project warns on `up` ("volume ... was created for
  # project X" / "was not created by Docker Compose"). external volumes are
  # never auto-created by Compose, so initializeCommand guarantees both exist.
  aic-shell-history:
    name: aic-shell-history
    external: true
  aic-auth-global:
    name: aic-auth-global
    external: true
  # Per-project — scoped to the deterministic top-level Compose name.
  aic-sessions:
  # Reserved sanitizer output; contains only root-owned allowlisted JSON.
  aic-sanitized-seed:
